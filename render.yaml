services:
  # Combined Frontend + Backend Service
  - type: web
    name: daveenci-ai
    env: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build:web
    startCommand: node apps/api/src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: API_URL
        value: /api
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
