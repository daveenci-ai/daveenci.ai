services:
  # Frontend - Static Site
  - type: web
    name: daveenci-web
    env: static
    buildCommand: npm install --include=dev && npm run build:web
    staticPublishPath: apps/web/dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: API_URL
        value: https://daveenci-ai-backend.onrender.com/api
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block

  # Backend - Node.js API
  - type: web
    name: daveenci-ai-backend
    env: node
    plan: starter
    buildCommand: npm install --include=dev
    startCommand: node apps/api/src/server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://daveenci.ai
      - key: OPENAI_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
